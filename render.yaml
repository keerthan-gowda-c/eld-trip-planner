services:
  - type: web
    name: eld-trip-planner-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn config.wsgi --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_ALLOWED_HOSTS
        value: eld-trip-planner-api.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://eld-trip-planner.vercel.app
      - key: PYTHON_VERSION
        value: "3.12.3"
